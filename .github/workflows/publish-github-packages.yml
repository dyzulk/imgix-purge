name: Publish Package History to GitHub Packages

on:
  workflow_dispatch:

jobs:
  publish-history:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://npm.pkg.github.com'
          scope: '@dyzulk'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Run Publish History Script
        run: npx tsx scripts/publish-github-packages.ts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
